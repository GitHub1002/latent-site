<svg viewBox="0 0 680 510" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <!-- background -->
  <rect x="0" y="0" width="680" height="510" fill="#f7f9fc"/>

  <!-- title -->
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1f2d3d">M2+M3 · 查数据 + 权限红线（让 Agent 安全查年假）</text>
  <text x="24" y="56" font-size="12" fill="#6b7785">模型只能决定「调不调」，服务端决定「查谁」——张三永远查不到李四</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Box1 同事/浏览器 -->
  <rect x="24" y="86" width="150" height="60" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="99" y="112" font-size="13" font-weight="700" fill="#3730a3" text-anchor="middle">同事 / 浏览器</text>
  <text x="99" y="132" font-size="11" fill="#4338ca" text-anchor="middle">Header: X-User-Id=zhangsan</text>

  <!-- Box2 FastAPI -->
  <rect x="24" y="176" width="170" height="56" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="109" y="208" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">FastAPI  POST /chat</text>

  <!-- Box3 服务端注入身份（红线） -->
  <rect x="210" y="176" width="220" height="56" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="320" y="200" font-size="13" font-weight="700" fill="#b91c1c" text-anchor="middle">① 服务端注入身份</text>
  <text x="320" y="220" font-size="11" fill="#b91c1c" text-anchor="middle">user_id_ctx = 'zhangsan'</text>

  <!-- Box4 LLM -->
  <rect x="24" y="268" width="210" height="60" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="129" y="294" font-size="13" font-weight="700" fill="#3730a3" text-anchor="middle">run_agent → LLM</text>
  <text x="129" y="314" font-size="11" fill="#4338ca" text-anchor="middle">绑定 2 个工具</text>

  <!-- Box5 RAG 工具 -->
  <rect x="24" y="360" width="290" height="56" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="169" y="386" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">search_knowledge_base</text>
  <text x="169" y="406" font-size="11" fill="#64748b" text-anchor="middle">（RAG 文档检索）</text>

  <!-- Box6 请假工具（蓝，强调无 user 参数） -->
  <rect x="340" y="360" width="316" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="498" y="386" font-size="13" font-weight="700" fill="#1d4ed8" text-anchor="middle">get_leave_balance</text>
  <text x="498" y="406" font-size="11" fill="#1d4ed8" text-anchor="middle">⚠ 工具无 user 参数，只读 user_id_ctx</text>

  <!-- Box7 DB -->
  <rect x="340" y="442" width="316" height="48" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="498" y="464" font-size="12" font-weight="700" fill="#047857" text-anchor="middle">SQLite leave_balances</text>
  <text x="498" y="482" font-size="11" fill="#047857" text-anchor="middle">WHERE user_id = ? （参数化，防注入）</text>

  <!-- arrows -->
  <line x1="99" y1="146" x2="99" y2="174" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="194" y1="204" x2="208" y2="204" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="109" y1="232" x2="109" y2="266" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="109" y1="328" x2="109" y2="358" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M234 298 H330 V360" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="498" y1="416" x2="498" y2="440" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 红线：身份来源 -->
  <path d="M320 232 V322 H340" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowRed)"/>
  <text x="332" y="284" font-size="11" font-weight="700" fill="#b91c1c">身份只来自这里</text>

  <!-- 底部红线说明 -->
  <rect x="24" y="500" width="632" height="0" fill="none"/>
  <text x="24" y="500" font-size="11" font-weight="700" fill="#b91c1c">权限红线：user_id 永远来自服务端登录态，模型只能决定「调不调」，无法指定「查谁」。</text>
</svg>
