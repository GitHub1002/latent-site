<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
  <defs>
    <style>
      .center { font: bold 15px system-ui, sans-serif; fill: #fff; }
      .branch { font: bold 12px system-ui, sans-serif; fill: #fff; }
      .leaf { font: 10.5px system-ui, sans-serif; fill: #444; }
      .line { stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect width="900" height="480" rx="12" fill="#fafafa"/>

  <!-- Center -->
  <rect x="340" y="215" width="220" height="50" rx="25" fill="#2563eb"/>
  <text x="450" y="246" text-anchor="middle" class="center">A2A 协议核心</text>

  <!-- Top-left: Agent Card (green) -->
  <path d="M370 225 Q280 170 190 120" class="line" stroke="#059669"/>
  <rect x="40" y="95" width="220" height="38" rx="19" fill="#059669"/>
  <text x="150" y="119" text-anchor="middle" class="branch">Agent Card 名片发现</text>
  <text x="40" y="155" class="leaf">GET /.well-known/agent.json</text>
  <text x="40" y="173" class="leaf">描述: 能力、技能、通信地址</text>
  <text x="40" y="191" class="leaf">类比: Agent 的&quot;营业执照&quot;</text>

  <!-- Top-right: Task 生命周期 (purple) -->
  <path d="M530 225 Q620 170 710 120" class="line" stroke="#7c3aed"/>
  <rect x="640" y="95" width="220" height="38" rx="19" fill="#7c3aed"/>
  <text x="750" y="119" text-anchor="middle" class="branch">Task 生命周期</text>
  <text x="640" y="155" class="leaf">submitted &#8594; working &#8594; completed</text>
  <text x="640" y="173" class="leaf">input-required: 需要补充信息</text>
  <text x="640" y="191" class="leaf">failed / canceled: 异常终止</text>

  <!-- Left: Message 消息结构 (orange) -->
  <path d="M340 240 Q230 240 130 240" class="line" stroke="#ea580c"/>
  <rect x="10" y="226" width="200" height="38" rx="19" fill="#ea580c"/>
  <text x="110" y="250" text-anchor="middle" class="branch">Message 消息结构</text>
  <text x="10" y="285" class="leaf">role: user / agent</text>
  <text x="10" y="303" class="leaf">parts: TextPart | FilePart | DataPart</text>
  <text x="10" y="321" class="leaf">支持多模态内容传递</text>

  <!-- Right: Artifact 产出 (red) -->
  <path d="M560 240 Q660 240 760 240" class="line" stroke="#dc2626"/>
  <rect x="700" y="226" width="180" height="38" rx="19" fill="#dc2626"/>
  <text x="790" y="250" text-anchor="middle" class="branch">Artifact 产出</text>
  <text x="700" y="285" class="leaf">Agent 最终交付物</text>
  <text x="700" y="303" class="leaf">与 Message 区分过程与结果</text>
  <text x="700" y="321" class="leaf">文件、数据、报告等</text>

  <!-- Bottom-left: MCP vs A2A (cyan) -->
  <path d="M380 265 Q300 330 220 380" class="line" stroke="#0891b2"/>
  <rect x="60" y="370" width="240" height="38" rx="19" fill="#0891b2"/>
  <text x="180" y="394" text-anchor="middle" class="branch">MCP vs A2A 对比</text>
  <text x="60" y="428" class="leaf">MCP: Agent &#8594; Tool (&quot;手&quot;)</text>
  <text x="60" y="446" class="leaf">A2A: Agent &#8594; Agent (&quot;嘴&quot;)</text>
  <text x="60" y="464" class="leaf">互补关系，非竞争</text>

  <!-- Bottom-right: 设计亮点 (yellow) -->
  <path d="M520 265 Q600 330 680 380" class="line" stroke="#ca8a04"/>
  <rect x="600" y="370" width="240" height="38" rx="19" fill="#ca8a04"/>
  <text x="720" y="394" text-anchor="middle" class="branch">设计亮点</text>
  <text x="600" y="428" class="leaf">不透明执行: 内部逻辑对外不可见</text>
  <text x="600" y="446" class="leaf">SSE / Push Notification 长任务</text>
  <text x="600" y="464" class="leaf">HTTP + JSON-RPC 标准安全</text>

  <!-- Bottom note -->
  <text x="450" y="478" text-anchor="middle" font-size="11" fill="#888">
    A2A = Agent 间通信标准 | 基于 HTTP + JSON-RPC + SSE | 与 MCP 互补构建完整 Agent 生态
  </text>
</svg>
