<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <style>
      .center { font: bold 16px sans-serif; fill: #fff; }
      .branch { font: bold 13px sans-serif; fill: #fff; }
      .leaf { font: 11px sans-serif; fill: #333; }
      .line { stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#fafafa"/>

  <!-- Center node -->
  <rect x="350" y="225" width="200" height="50" rx="25" fill="#2563eb"/>
  <text x="450" y="256" text-anchor="middle" class="center">大模型核心机制</text>

  <!-- Branch 1: Transformer (top-left) -->
  <path d="M380 225 Q340 180 300 150" class="line" stroke="#2563eb"/>
  <rect x="210" y="125" width="160" height="40" rx="20" fill="#7c3aed"/>
  <text x="290" y="150" text-anchor="middle" class="branch">Transformer 架构</text>
  <!-- Leaves -->
  <text x="160" y="95" class="leaf">自注意力 (Self-Attention)</text>
  <path d="M250 125 L170 85" class="line" stroke="#7c3aed" stroke-width="1"/>
  <text x="160" y="115" class="leaf">前馈网络 (FFN)</text>
  <path d="M250 130 L170 110" class="line" stroke="#7c3aed" stroke-width="1"/>
  <text x="310" y="95" class="leaf">层叠: 浅层→深层</text>
  <path d="M310 125 L330 90" class="line" stroke="#7c3aed" stroke-width="1"/>

  <!-- Branch 2: Tokenization (top-right) -->
  <path d="M520 225 Q560 180 600 150" class="line" stroke="#2563eb"/>
  <rect x="530" y="125" width="160" height="40" rx="20" fill="#059669"/>
  <text x="610" y="150" text-anchor="middle" class="branch">Tokenization</text>
  <!-- Leaves -->
  <text x="570" y="95" class="leaf">BPE: 字符→合并→词表</text>
  <path d="M590 125 L580 90" class="line" stroke="#059669" stroke-width="1"/>
  <text x="680" y="95" class="leaf">中文 token ≈ 英文 1.5~2x</text>
  <path d="M640 125 L690 90" class="line" stroke="#059669" stroke-width="1"/>
  <text x="680" y="115" class="leaf">影响成本和数字处理</text>
  <path d="M640 130 L690 110" class="line" stroke="#059669" stroke-width="1"/>

  <!-- Branch 3: Context Window (bottom-left) -->
  <path d="M380 275 Q340 320 300 350" class="line" stroke="#2563eb"/>
  <rect x="200" y="340" width="180" height="40" rx="20" fill="#dc2626"/>
  <text x="290" y="365" text-anchor="middle" class="branch">Context Window</text>
  <!-- Leaves -->
  <text x="140" y="410" class="leaf">输入 + 输出共用窗口</text>
  <path d="M260 380 L170 405" class="line" stroke="#dc2626" stroke-width="1"/>
  <text x="140" y="435" class="leaf">GPT-4o: 128K tokens</text>
  <path d="M260 385 L170 430" class="line" stroke="#dc2626" stroke-width="1"/>
  <text x="320" y="410" class="leaf">窗口越大→信息越多→成本越高</text>
  <path d="M320 380 L340 405" class="line" stroke="#dc2626" stroke-width="1"/>

  <!-- Branch 4: Autoregressive (bottom-right) -->
  <path d="M520 275 Q560 320 600 350" class="line" stroke="#2563eb"/>
  <rect x="530" y="340" width="180" height="40" rx="20" fill="#ea580c"/>
  <text x="620" y="365" text-anchor="middle" class="branch">自回归生成</text>
  <!-- Leaves -->
  <text x="570" y="410" class="leaf">逐 token 预测，不是整体理解</text>
  <path d="M590 380 L580 405" class="line" stroke="#ea580c" stroke-width="1"/>
  <text x="680" y="410" class="leaf">Temperature: 温度越低越确定</text>
  <path d="M650 380 L690 405" class="line" stroke="#ea580c" stroke-width="1"/>
  <text x="680" y="435" class="leaf">Top-p: 只从高概率中选</text>
  <path d="M650 385 L690 430" class="line" stroke="#ea580c" stroke-width="1"/>

  <!-- Bottom legend -->
  <text x="450" y="495" text-anchor="middle" font-size="11" fill="#888">
    LLM = 概率机器：给定前文，逐 token 预测下一个 | 下一站 → Prompt Engineering
  </text>
</svg>
