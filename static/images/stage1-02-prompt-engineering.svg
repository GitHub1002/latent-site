<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <style>
      .center { font: bold 16px sans-serif; fill: #fff; }
      .branch { font: bold 12px sans-serif; fill: #fff; }
      .leaf { font: 10.5px sans-serif; fill: #444; }
      .line { stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect width="900" height="480" rx="12" fill="#fafafa"/>

  <!-- Center -->
  <rect x="340" y="210" width="220" height="50" rx="25" fill="#2563eb"/>
  <text x="450" y="241" text-anchor="middle" class="center">Prompt Engineering 6 大技巧</text>

  <!-- Top-left: Zero-shot -->
  <path d="M370 210 Q300 160 220 130" class="line" stroke="#059669"/>
  <rect x="120" y="108" width="150" height="36" rx="18" fill="#059669"/>
  <text x="195" y="131" text-anchor="middle" class="branch">1. Zero-shot</text>
  <text x="80" y="85" class="leaf">直接给清晰指令</text>
  <path d="M165 108 L110 80" class="line" stroke="#059669" stroke-width="1"/>
  <text x="200" y="85" class="leaf">适用: 翻译/摘要/常识</text>
  <path d="M210 108 L220 80" class="line" stroke="#059669" stroke-width="1"/>

  <!-- Top-right: Few-shot -->
  <path d="M530 210 Q600 160 680 130" class="line" stroke="#7c3aed"/>
  <rect x="620" y="108" width="150" height="36" rx="18" fill="#7c3aed"/>
  <text x="695" y="131" text-anchor="middle" class="branch">2. Few-shot</text>
  <text x="620" y="85" class="leaf">给 3~5 个示例</text>
  <path d="M670 108 L640 80" class="line" stroke="#7c3aed" stroke-width="1"/>
  <text x="720" y="85" class="leaf">In-Context Learning</text>
  <path d="M720 108 L740 80" class="line" stroke="#7c3aed" stroke-width="1"/>

  <!-- Mid-left: CoT -->
  <path d="M340 235 Q260 235 180 235" class="line" stroke="#ea580c"/>
  <rect x="50" y="218" width="180" height="36" rx="18" fill="#ea580c"/>
  <text x="140" y="241" text-anchor="middle" class="branch">3. Chain-of-Thought</text>
  <text x="40" y="280" class="leaf">"请逐步推理"</text>
  <path d="M110 254 L80 275" class="line" stroke="#ea580c" stroke-width="1"/>
  <text x="160" y="280" class="leaf">数学/逻辑/推理必用</text>
  <path d="M170 254 L190 275" class="line" stroke="#ea580c" stroke-width="1"/>

  <!-- Mid-right: Self-Consistency -->
  <path d="M560 235 Q640 235 720 235" class="line" stroke="#dc2626"/>
  <rect x="660" y="218" width="200" height="36" rx="18" fill="#dc2626"/>
  <text x="760" y="241" text-anchor="middle" class="branch">4. Self-Consistency</text>
  <text x="690" y="280" class="leaf">多次推理 + 多数投票</text>
  <path d="M730 254 L710 275" class="line" stroke="#dc2626" stroke-width="1"/>
  <text x="810" y="280" class="leaf">代价: 多次 API 调用</text>
  <path d="M790 254 L820 275" class="line" stroke="#dc2626" stroke-width="1"/>

  <!-- Bottom-left: System Prompt -->
  <path d="M370 260 Q300 320 220 360" class="line" stroke="#0891b2"/>
  <rect x="110" y="348" width="180" height="36" rx="18" fill="#0891b2"/>
  <text x="200" y="371" text-anchor="middle" class="branch">5. System Prompt</text>
  <text x="100" y="410" class="leaf">定义角色、约束、格式</text>
  <path d="M170 384 L130 405" class="line" stroke="#0891b2" stroke-width="1"/>
  <text x="260" y="410" class="leaf">保持 200~500 字以内</text>
  <path d="M230 384 L270 405" class="line" stroke="#0891b2" stroke-width="1"/>

  <!-- Bottom-right: Structured Output -->
  <path d="M530 260 Q600 320 680 360" class="line" stroke="#ca8a04"/>
  <rect x="600" y="348" width="200" height="36" rx="18" fill="#ca8a04"/>
  <text x="700" y="371" text-anchor="middle" class="branch">6. Structured Output</text>
  <text x="630" y="410" class="leaf">JSON / XML 格式输出</text>
  <path d="M670 384 L650 405" class="line" stroke="#ca8a04" stroke-width="1"/>
  <text x="750" y="410" class="leaf">Agent 解析必备</text>
  <path d="M730 384 L760 405" class="line" stroke="#ca8a04" stroke-width="1"/>

  <!-- Bottom note -->
  <text x="450" y="460" text-anchor="middle" font-size="11" fill="#888">
    最佳实践：System Prompt + Few-shot + CoT + Structured Output 组合使用
  </text>
</svg>
