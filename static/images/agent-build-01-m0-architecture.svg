<svg viewBox="0 0 680 500" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>M0 最小闭环架构</title>
  <desc>用户携带 X-User-Id 头发起 POST /chat，FastAPI 经鉴权桩注入 user_id，由 langchain ChatOpenAI 调用 DashScope Qwen API 生成回复，原样回传 user_id。RAG/数据库/权限等后续阶段以灰色虚框标注为待实现。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 主线箭头 -->
  <line x1="340" y1="64" x2="340" y2="90" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="148" x2="340" y2="168" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="226" x2="340" y2="248" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 调用 Qwen 双向 -->
  <path d="M410 278 L540 318" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M540 378 L410 412" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- 用户 -->
  <g>
    <rect x="240" y="20" width="200" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="47" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C" font-family="sans-serif">用户提问 + X-User-Id 头</text>
  </g>

  <!-- 入口鉴权（红线基石） -->
  <g>
    <rect x="225" y="92" width="230" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
    <text x="340" y="110" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#791F1F" font-family="sans-serif">入口层：鉴权桩</text>
    <text x="340" y="132" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#A32D2D" font-family="sans-serif">get_current_user → user_id</text>
  </g>

  <!-- /chat 端点 -->
  <g>
    <rect x="205" y="170" width="270" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="188" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C" font-family="sans-serif">FastAPI POST /chat</text>
    <text x="340" y="210" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5" font-family="sans-serif">llm.ainvoke(req.message)</text>
  </g>

  <!-- ChatOpenAI 工厂 -->
  <g>
    <rect x="205" y="250" width="270" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="268" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C" font-family="sans-serif">langchain ChatOpenAI 工厂</text>
    <text x="340" y="290" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5" font-family="sans-serif">get_llm()：model = qwen-plus</text>
  </g>

  <!-- DashScope Qwen -->
  <g>
    <rect x="450" y="298" width="200" height="100" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="550" y="320" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806" font-family="sans-serif">DashScope Qwen API</text>
    <text x="550" y="346" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B" font-family="sans-serif">compatible-mode/v1</text>
    <text x="550" y="368" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B" font-family="sans-serif">OpenAI 兼容协议</text>
    <text x="550" y="388" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B" font-family="sans-serif">返回回复内容</text>
  </g>

  <!-- 返回 -->
  <text x="340" y="432" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#0C447C" font-family="sans-serif">→ ChatResponse { reply, user_id }</text>

  <!-- 待实现虚框 -->
  <g>
    <rect x="40" y="452" width="600" height="40" rx="8" fill="none" stroke="#9AA0A6" stroke-width="1" stroke-dasharray="6 4"/>
    <text x="340" y="476" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#5F6368" font-family="sans-serif">M1 RAG 私有文件 · M2 数据库查询 · M3 权限/JWT（后续阶段实现）</text>
  </g>
</svg>
