<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" font-family="-apple-system, 'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="340" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#222">M4 聪明安全：友好降级 + 示意流程图</text>

  <!-- 用户 -->
  <rect x="30" y="70" width="110" height="46" rx="10" fill="#eaf2fb" stroke="#3a78c2"/>
  <text x="85" y="98" text-anchor="middle" font-size="14" fill="#222">用户提问</text>

  <!-- Agent -->
  <rect x="200" y="64" width="150" height="58" rx="10" fill="#e7f6ec" stroke="#27ae60"/>
  <text x="275" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#222">Agent (LLM)</text>
  <text x="275" y="110" text-anchor="middle" font-size="12" fill="#555">决策：调工具？</text>
  <line x1="140" y1="93" x2="197" y2="93" stroke="#555" marker-end="url(#arrow)"/>

  <!-- 工具：RAG -->
  <rect x="410" y="40" width="200" height="50" rx="10" fill="#f3f4f6" stroke="#888"/>
  <text x="510" y="62" text-anchor="middle" font-size="13" fill="#222">search_knowledge_base</text>
  <text x="510" y="80" text-anchor="middle" font-size="12" fill="#555">RAG 检索私有知识库</text>

  <!-- 工具：假期（带身份虚线） -->
  <rect x="410" y="110" width="200" height="50" rx="10" fill="#f3f4f6" stroke="#888"/>
  <text x="510" y="132" text-anchor="middle" font-size="13" fill="#222">get_leave_balance</text>
  <text x="510" y="150" text-anchor="middle" font-size="12" fill="#555">查本人假期（零参数）</text>

  <line x1="350" y1="84" x2="407" y2="62" stroke="#555" marker-end="url(#arrow)"/>
  <line x1="350" y1="100" x2="407" y2="132" stroke="#555" marker-end="url(#arrow)"/>

  <!-- 身份注入红虚线（继承自 M3） -->
  <line x1="510" y1="185" x2="510" y2="205" stroke="#c0392b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowR)"/>
  <text x="615" y="200" text-anchor="middle" font-size="11" fill="#c0392b">身份只来自服务端注入</text>
  <text x="615" y="216" text-anchor="middle" font-size="11" fill="#c0392b">模型无「查谁」入口</text>

  <!-- 接地信号 -->
  <rect x="410" y="225" width="200" height="40" rx="8" fill="#fff7e6" stroke="#e0a800"/>
  <text x="510" y="250" text-anchor="middle" font-size="12" fill="#222">接地信号（ContextVar）</text>

  <line x1="510" y1="160" x2="510" y2="223" stroke="#888" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- apply_graceful 判定菱形 -->
  <polygon points="510,300 600,350 510,400 420,350" fill="#eef" stroke="#5b6bd6"/>
  <text x="510" y="345" text-anchor="middle" font-size="11" fill="#222">apply_graceful</text>
  <text x="510" y="362" text-anchor="middle" font-size="10" fill="#555">rag_called ∧</text>
  <text x="510" y="376" text-anchor="middle" font-size="10" fill="#555">¬rag_found ∧ ¬leave_found?</text>
  <line x1="510" y1="265" x2="510" y2="298" stroke="#5b6bd6" marker-end="url(#arrow)"/>

  <!-- YES -> 降级 -->
  <line x1="420" y1="350" x2="300" y2="350" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowR)"/>
  <rect x="120" y="326" width="180" height="48" rx="10" fill="#fdecea" stroke="#c0392b"/>
  <text x="210" y="348" text-anchor="middle" font-size="13" font-weight="600" fill="#c0392b">友好降级话术</text>
  <text x="210" y="366" text-anchor="middle" font-size="11" fill="#a93226">未找到 + 建议联系 HR/IT</text>
  <text x="345" y="335" text-anchor="middle" font-size="11" fill="#c0392b">是</text>

  <!-- NO -> 最终回答 -->
  <line x1="600" y1="350" x2="640" y2="350" stroke="#27ae60" marker-end="url(#arrow)"/>
  <rect x="500" y="430" width="180" height="56" rx="10" fill="#e7f6ec" stroke="#27ae60"/>
  <text x="590" y="452" text-anchor="middle" font-size="13" font-weight="600" fill="#1e8449">最终回答</text>
  <text x="590" y="470" text-anchor="middle" font-size="11" fill="#1e8449">流程类自动带</text>
  <text x="590" y="484" text-anchor="middle" font-size="11" fill="#1e8449">```mermaid 流程图</text>
  <path d="M510,400 C510,440 530,458 499,458" fill="none" stroke="#27ae60" marker-end="url(#arrow)"/>
  <text x="640" y="335" text-anchor="middle" font-size="11" fill="#27ae60">否</text>

  <!-- 图例 -->
  <text x="30" y="510" font-size="11" fill="#777">红虚线 = 继承自 M3 的权限红线（身份仅服务端注入）；菱形 = M4 新增的接地判定网</text>
  <text x="30" y="528" font-size="11" fill="#777">验证：降级丢弃编造 / 闲聊不误伤 / 流程带 mermaid / lisi 仍查不到 zhangsan</text>
</svg>
