<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <style>
      .center { font: bold 15px sans-serif; fill: #fff; }
      .step { font: bold 12px sans-serif; fill: #fff; }
      .leaf { font: 10.5px sans-serif; fill: #444; }
      .line { stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect width="900" height="480" rx="12" fill="#fafafa"/>

  <!-- Title -->
  <rect x="280" y="15" width="340" height="40" rx="20" fill="#2563eb"/>
  <text x="450" y="41" text-anchor="middle" class="center">实战：智能研究助手 Agent</text>

  <!-- Step flow -->
  <!-- Step 1 -->
  <rect x="50" y="85" width="160" height="36" rx="18" fill="#059669"/>
  <text x="130" y="108" text-anchor="middle" class="step">Step 1: 创建 Agent</text>
  <text x="130" y="140" text-anchor="middle" class="leaf">create_react_agent</text>
  <text x="130" y="157" text-anchor="middle" class="leaf">verbose=True 观察循环</text>

  <!-- Step 2 -->
  <rect x="250" y="85" width="160" height="36" rx="18" fill="#7c3aed"/>
  <text x="330" y="108" text-anchor="middle" class="step">Step 2: 添加工具</text>
  <text x="330" y="140" text-anchor="middle" class="leaf">search_web (DuckDuckGo)</text>
  <text x="330" y="157" text-anchor="middle" class="leaf">calculator + run_python</text>

  <!-- Step 3 -->
  <rect x="450" y="85" width="160" height="36" rx="18" fill="#ea580c"/>
  <text x="530" y="108" text-anchor="middle" class="step">Step 3: 运行观察</text>
  <text x="530" y="140" text-anchor="middle" class="leaf">Thought → Action</text>
  <text x="530" y="157" text-anchor="middle" class="leaf">→ Observation → 循环</text>

  <!-- Step 4 -->
  <rect x="650" y="85" width="160" height="36" rx="18" fill="#dc2626"/>
  <text x="730" y="108" text-anchor="middle" class="step">Step 4: 封装 Skill</text>
  <text x="730" y="140" text-anchor="middle" class="leaf">research_and_report</text>
  <text x="730" y="157" text-anchor="middle" class="leaf">搜索+分析+报告 = 1 步</text>

  <!-- Arrows -->
  <path d="M210 103 L250 103" class="line" stroke="#888"/>
  <path d="M410 103 L450 103" class="line" stroke="#888"/>
  <path d="M610 103 L650 103" class="line" stroke="#888"/>

  <!-- Step 5 + 6: 防护 + 日志 -->
  <rect x="200" y="195" width="220" height="36" rx="18" fill="#0891b2"/>
  <text x="310" y="218" text-anchor="middle" class="step">Step 5: 添加防护机制</text>
  <text x="310" y="252" text-anchor="middle" class="leaf">max_iterations=10</text>
  <text x="310" y="269" text-anchor="middle" class="leaf">max_execution_time=120s</text>
  <text x="310" y="286" text-anchor="middle" class="leaf">handle_parsing_errors=True</text>

  <rect x="480" y="195" width="220" height="36" rx="18" fill="#ca8a04"/>
  <text x="590" y="218" text-anchor="middle" class="step">Step 6: 循环日志分析</text>
  <text x="590" y="252" text-anchor="middle" class="leaf">LoopLogger Callback</text>
  <text x="590" y="269" text-anchor="middle" class="leaf">记录每轮的 tool / time / thought</text>
  <text x="590" y="286" text-anchor="middle" class="leaf">→ 第五阶段接入 LangFuse</text>

  <!-- Agent 运行示例 -->
  <rect x="120" y="320" width="660" height="110" rx="10" fill="#1e293b"/>
  <text x="140" y="345" font-family="monospace" font-size="11" fill="#94a3b8">Agent 运行示例:</text>
  <text x="140" y="365" font-family="monospace" font-size="11" fill="#4ade80">Thought: 需要搜索 AI 市场数据</text>
  <text x="140" y="382" font-family="monospace" font-size="11" fill="#60a5fa">Action: search_web | Input: "2025 AI market size"</text>
  <text x="140" y="399" font-family="monospace" font-size="11" fill="#f59e0b">Observation: Global AI market ~$196B...</text>
  <text x="140" y="416" font-family="monospace" font-size="11" fill="#4ade80">Thought: 数据已获取，计算 2027 年预测值</text>

  <!-- Bottom note -->
  <text x="450" y="465" text-anchor="middle" font-size="11" fill="#888">
    第二阶段核心：从"一问一答"到"自主循环执行任务" | 下一站 → Context Engineering &amp; RAG
  </text>
</svg>
