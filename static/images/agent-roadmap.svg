  <line x1="550" y1="100" x2="330" y2="180" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="550" y1="100" x2="550" y2="180" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="550" y1="100" x2="770" y2="180" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,4"/>
