    <text x="25" y="283" font-size="9.5" fill="#475569">• Prompt Engineering</text>
    <text x="25" y="298" font-size="9.5" fill="#475569">• Reasoning Models (o1/R1)</text>
    <text x="25" y="313" font-size="9.5" fill="#475569">• CoT / Self-Consistency</text>

