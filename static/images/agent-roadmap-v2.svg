  <text x="915" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">Harness Engineering</text>
  <text x="915" y="133" text-anchor="middle" font-size="9" fill="#64748b">"整个脚手架怎么搭？"</text>

