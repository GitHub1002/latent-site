  <!-- Background -->
  <rect width="1100" height="700" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">AI Agent 学习路线图 v2</text>
  <text x="550" y="56" text-anchor="middle" font-size="11" fill="#64748b">四大工程类型 · 五大学习阶段 · 全覆盖关键概念</text>

  <!-- ========== FOUR ENGINEERING TYPES ========== -->
  <rect x="30" y="72" width="1040" height="80" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="55" y="92" font-size="11" font-weight="700" fill="#475569">四大工程类型</text>

  <!-- PE -->
  <rect x="55" y="100" width="215" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="162" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">Prompt Engineering</text>
  <text x="162" y="133" text-anchor="middle" font-size="9" fill="#64748b">"这一句话怎么写？"</text>

  <path d="M275 120 L295 120" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- CE -->
  <rect x="300" y="100" width="215" height="40" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="407" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Context Engineering</text>
  <text x="407" y="133" text-anchor="middle" font-size="9" fill="#64748b">"给模型看到什么？"</text>

  <path d="M520 120 L540 120" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- LE -->
  <rect x="545" y="100" width="215" height="40" rx="8" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1"/>
  <text x="652" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#0891b2">Loop Engineering</text>
  <text x="652" y="133" text-anchor="middle" font-size="9" fill="#64748b">"自主循环怎么跑？"</text>

  <path d="M765 120 L785 120" stroke="#06b6d4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

