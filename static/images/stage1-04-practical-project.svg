<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <style>
      .center { font: bold 15px sans-serif; fill: #fff; }
      .step { font: bold 12px sans-serif; fill: #fff; }
      .leaf { font: 10.5px sans-serif; fill: #444; }
      .line { stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect width="900" height="420" rx="12" fill="#fafafa"/>

  <!-- Title -->
  <rect x="300" y="20" width="300" height="40" rx="20" fill="#2563eb"/>
  <text x="450" y="46" text-anchor="middle" class="center">实战项目：技术文章摘要生成器</text>

  <!-- Step flow: horizontal steps -->
  <!-- Step 1 -->
  <rect x="30" y="100" width="130" height="36" rx="18" fill="#059669"/>
  <text x="95" y="123" text-anchor="middle" class="step">Step 1: API 调用</text>
  <text x="95" y="155" text-anchor="middle" class="leaf">跑通最简调用</text>
  <text x="95" y="172" text-anchor="middle" class="leaf">Zero-shot</text>

  <!-- Arrow 1→2 -->
  <path d="M160 118 L195 118" class="line" stroke="#888" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="195" y="100" width="130" height="36" rx="18" fill="#7c3aed"/>
  <text x="260" y="123" text-anchor="middle" class="step">Step 2: 角色设定</text>
  <text x="260" y="155" text-anchor="middle" class="leaf">System Prompt</text>
  <text x="260" y="172" text-anchor="middle" class="leaf">定义"技术编辑"</text>

  <!-- Arrow 2→3 -->
  <path d="M325 118 L360 118" class="line" stroke="#888"/>

  <!-- Step 3 -->
  <rect x="360" y="100" width="130" height="36" rx="18" fill="#ea580c"/>
  <text x="425" y="123" text-anchor="middle" class="step">Step 3: 示例引导</text>
  <text x="425" y="155" text-anchor="middle" class="leaf">Few-shot</text>
  <text x="425" y="172" text-anchor="middle" class="leaf">3~5 个好摘要</text>

  <!-- Arrow 3→4 -->
  <path d="M490 118 L525 118" class="line" stroke="#888"/>

  <!-- Step 4 -->
  <rect x="525" y="100" width="130" height="36" rx="18" fill="#dc2626"/>
  <text x="590" y="123" text-anchor="middle" class="step">Step 4: CoT</text>
  <text x="590" y="155" text-anchor="middle" class="leaf">先分析后总结</text>
  <text x="590" y="172" text-anchor="middle" class="leaf">+ JSON 格式</text>

  <!-- Arrow 4→5 -->
  <path d="M655 118 L690 118" class="line" stroke="#888"/>

  <!-- Step 5 -->
  <rect x="690" y="100" width="160" height="36" rx="18" fill="#0891b2"/>
  <text x="770" y="123" text-anchor="middle" class="step">Step 5: 完整项目</text>
  <text x="770" y="155" text-anchor="middle" class="leaf">ArticleSummarizer 类</text>
  <text x="770" y="172" text-anchor="middle" class="leaf">批量处理 + token 统计</text>

  <!-- Step 6: Experiment -->
  <rect x="320" y="210" width="260" height="36" rx="18" fill="#ca8a04"/>
  <text x="450" y="233" text-anchor="middle" class="step">Step 6: 对比实验（最有学习价值）</text>
  <path d="M450 192 L450 210" class="line" stroke="#888"/>

  <!-- Experiment details -->
  <text x="200" y="280" class="leaf">Zero-shot: 基线质量</text>
  <text x="200" y="300" class="leaf">+ System Prompt: 更专业</text>
  <text x="200" y="320" class="leaf">+ Few-shot: 风格一致</text>
  <text x="500" y="280" class="leaf">+ CoT: 逻辑更完整</text>
  <text x="500" y="300" class="leaf">+ 推理模型: 不需要复杂 Prompt</text>
  <text x="500" y="320" class="leaf">结论: 技巧叠加使用效果最佳</text>

  <!-- Bottom: Key takeaways -->
  <rect x="150" y="355" width="600" height="45" rx="8" fill="#f0f9ff" stroke="#2563eb" stroke-width="1"/>
  <text x="450" y="375" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="bold">关键收获</text>
  <text x="450" y="393" text-anchor="middle" font-size="10.5" fill="#555">
    技巧叠加使用 | Temperature 按任务调 | 结构化输出让 LLM 可编程 | 选对模型比调 Prompt 更重要
  </text>
</svg>
