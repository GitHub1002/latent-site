<svg viewBox="0 0 680 592" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>企业知识助手 Agent 架构</title>
  <desc>用户提问携带身份，经鉴权注入后进入 Agent 编排层，通过 Function Calling 调用 RAG 检索或数据库查询工具，数据库查询强制行级权限过滤，最终生成答案或 Mermaid 流程图，异常走友好降级。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <line x1="340" y1="64" x2="340" y2="90" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="148" x2="340" y2="168" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M270 198 L150 248" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M410 198 L530 248" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="130" y1="294" x2="130" y2="318" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="294" x2="550" y2="318" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M130 430 L300 458" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M550 430 L380 458" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="516" x2="340" y2="526" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g>
    <rect x="240" y="20" width="200" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C" font-family="sans-serif">用户提问 + 身份(user=张三)</text>
  </g>
  <g>
    <rect x="225" y="92" width="230" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
    <text x="340" y="110" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#791F1F" font-family="sans-serif">入口层：鉴权 &amp; 身份注入</text>
    <text x="340" y="132" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#A32D2D" font-family="sans-serif">系统拿到 user_id，下游强制携带</text>
  </g>
  <g>
    <rect x="205" y="170" width="270" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="188" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C" font-family="sans-serif">Agent 编排层：LLM + Function Calling</text>
    <text x="340" y="210" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5" font-family="sans-serif">模型决定调用哪个工具（不能指定查谁）</text>
  </g>
  <g>
    <rect x="40" y="250" width="180" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="130" y="272" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#0C447C" font-family="sans-serif">工具① search_knowledge_base</text>
  </g>
  <g>
    <rect x="460" y="250" width="180" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="550" y="272" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#0C447C" font-family="sans-serif">工具② get_leave_balance(uid)</text>
  </g>
  <g>
    <rect x="30" y="320" width="200" height="110" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text x="130" y="342" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A" font-family="sans-serif">RAG 私有文件问答</text>
    <text x="130" y="368" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11" font-family="sans-serif">文件解析 → 切分</text>
    <text x="130" y="388" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11" font-family="sans-serif">→ Embedding → 向量库</text>
    <text x="130" y="408" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11" font-family="sans-serif">→ 检索 → 重排</text>
  </g>
  <g>
    <rect x="450" y="320" width="200" height="110" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="550" y="342" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806" font-family="sans-serif">数据库查询</text>
    <text x="550" y="368" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B" font-family="sans-serif">参数化查询（防注入）</text>
    <text x="550" y="388" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B" font-family="sans-serif">行级过滤：只查自己</text>
    <text x="550" y="408" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B" font-family="sans-serif">user_id 由系统注入</text>
  </g>
  <g>
    <rect x="220" y="460" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="478" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C" font-family="sans-serif">生成层</text>
    <text x="340" y="500" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5" font-family="sans-serif">答案文本 / Mermaid 流程图</text>
  </g>
  <g>
    <rect x="220" y="528" width="240" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="340" y="550" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3C3489" font-family="sans-serif">降级层：检索空/失败/不可答 → 友好提示</text>
  </g>
</svg>
