<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
    <style>
      .box { fill:#ffffff; stroke:#9ca3af; stroke-width:2; rx:10; }
      .lab { font-size:13px; fill:#1f2937; }
      .ttl { font-size:14px; font-weight:700; fill:#111827; }
      .red { stroke:#dc2626; stroke-width:2.5; stroke-dasharray:6 4; fill:none; }
      .redlab { font-size:12px; fill:#dc2626; font-weight:700; }
      .note { font-size:11px; fill:#6b7280; }
    </style>
  </defs>

  <rect x="0" y="0" width="680" height="500" fill="#f9fafb"/>

  <!-- 标题 -->
  <text x="340" y="34" text-anchor="middle" class="ttl">M5 架构：Web 界面 + JWT 登录 + Mermaid 渲染</text>

  <!-- 浏览器 / React 前端 -->
  <rect x="30" y="70" width="200" height="150" class="box"/>
  <text x="130" y="96" text-anchor="middle" class="ttl">浏览器（React）</text>
  <text x="130" y="122" text-anchor="middle" class="lab">登录页：账号密码</text>
  <text x="130" y="144" text-anchor="middle" class="lab">聊天页：消息流</text>
  <text x="130" y="166" text-anchor="middle" class="lab">内存持有 JWT</text>
  <text x="130" y="196" text-anchor="middle" class="note">mermaid.js 渲染流程图</text>

  <!-- 后端 FastAPI -->
  <rect x="300" y="60" width="350" height="300" class="box"/>
  <text x="475" y="86" text-anchor="middle" class="ttl">FastAPI 后端</text>

  <!-- /login -->
  <rect x="330" y="104" width="290" height="48" rx="8" class="box"/>
  <text x="475" y="124" text-anchor="middle" class="lab">POST /login</text>
  <text x="475" y="142" text-anchor="middle" class="note">校验 users 表 → 签发 JWT（含 sub=user_id）</text>

  <!-- /chat -->
  <rect x="330" y="168" width="290" height="54" rx="8" class="box"/>
  <text x="475" y="189" text-anchor="middle" class="lab">POST /chat</text>
  <text x="475" y="207" text-anchor="middle" class="note">Authorization: Bearer &lt;JWT&gt;</text>

  <!-- get_current_user 解 JWT -->
  <rect x="330" y="238" width="290" height="44" rx="8" class="box"/>
  <text x="475" y="264" text-anchor="middle" class="lab">get_current_user 解 JWT</text>

  <!-- user_id_ctx 注入 -->
  <rect x="330" y="298" width="290" height="44" rx="8" class="box"/>
  <text x="475" y="324" text-anchor="middle" class="lab">user_id_ctx.set(user_id)</text>

  <!-- 工具层 -->
  <rect x="330" y="370" width="140" height="40" rx="8" class="box"/>
  <text x="400" y="394" text-anchor="middle" class="lab">RAG 工具</text>
  <rect x="480" y="370" width="140" height="40" rx="8" class="box"/>
  <text x="550" y="394" text-anchor="middle" class="lab">请假工具</text>

  <!-- DB -->
  <rect x="30" y="380" width="200" height="90" class="box"/>
  <text x="130" y="408" text-anchor="middle" class="ttl">数据层</text>
  <text x="130" y="432" text-anchor="middle" class="lab">users 表（账号/哈希）</text>
  <text x="130" y="454" text-anchor="middle" class="lab">leave_balances（本人）</text>

  <!-- 箭头 -->
  <line x1="230" y1="120" x2="328" y2="128" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="279" y="116" text-anchor="middle" class="note">账号密码</text>

  <line x1="230" y1="175" x2="328" y2="195" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="279" y="172" text-anchor="middle" class="note">Bearer JWT</text>

  <line x1="475" y1="152" x2="475" y2="166" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="475" y1="222" x2="475" y2="236" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="475" y1="282" x2="475" y2="296" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="475" y1="342" x2="475" y2="368" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="410" x2="400" y2="412" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="410" x2="470" y2="412" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 红色虚线：身份只来自服务端（JWT 解出的 sub） -->
  <path class="red" d="M312,238 Q300,300 312,342"/>
  <text x="248" y="295" text-anchor="middle" class="redlab">身份只来自</text>
  <text x="248" y="312" text-anchor="middle" class="redlab">服务端 JWT</text>
  <text x="248" y="329" text-anchor="middle" class="redlab">（工具零 user 参数）</text>

  <!-- 前端 mermaid 说明箭头 -->
  <line x1="130" y1="220" x2="130" y2="372" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="140" y="300" class="note">回复里的 ```mermaid</text>
  <text x="140" y="316" class="note">文本 → 画成图</text>
</svg>
