{{ if and (eq .Type "posts") (not .IsNode) }}
<section class="comments" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
  <h3 style="font-size: 1.1rem; margin-bottom: 1rem;">评论</h3>
  <script src="https://giscus.app/client.js"
    data-repo="[YOUR_GITHUB_REPO]"
    data-repo-id="[YOUR_REPO_ID]"
    data-category="Announcements"
    data-category-id="[YOUR_CATEGORY_ID]"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="preferred_color_scheme"
    data-lang="zh-CN"
    data-loading="lazy"
    crossorigin="anonymous"
    async>
  </script>
</section>
{{ end }}
